<div class="class-card">
  <div class="card-header">
    <h3 class="class-name">{{ classData.name }}</h3>
  </div>
  
  <div class="card-body">
    <div class="card-field">
      <label>שם המורה:</label>
      <span>{{ classData.instructor }}</span>
    </div>
    
    <div class="card-field">
      <label>מספר מפגשים:</label>
      <span>{{ classData.numberOfSessions }}</span>
    </div>
    
    <div class="card-field">
      <label>תאריך התחלה:</label>
      <span>{{ classData.startDate }}</span>
    </div>
    
    <div class="card-field">
      <label>מחיר:</label>
      <span class="price">₪{{ classData.price }}</span>
    </div>
    
    <div class="card-field">
      <label>יום:</label>
      <span>{{ classData.day }}</span>
    </div>
    
    <div class="card-field">
      <label>שעה:</label>
      <span>{{ classData.time }}</span>
    </div>
  </div>
  
  <div class="card-footer">
    <button class="btn-register">הרשם לשיעור</button>
  </div>
</div>
